<section class="home">
  <div class="intro">
    <p class="eyebrow">{{ i18n.t('homeEyebrow') }}</p>
    <h1>{{ i18n.t('homeTitle') }}</h1>
    <p class="lead">
      {{ i18n.t('homeLead') }}
    </p>
    <div class="home-actions">
      <a class="play-link" routerLink="/games/pocket-pet">{{ i18n.t('openFirstGame') }}</a>
      <a class="secondary-link" routerLink="/games/tic-tac-toe">{{ i18n.t('openTicTacToe') }}</a>
      @if (activePetId(); as petId) {
        <a class="secondary-link" [routerLink]="['/games/pocket-pet', petId]">{{ i18n.t('viewPetSession') }}</a>
        <a class="secondary-link" [routerLink]="['/profile/pets', petId]">{{ i18n.t('viewPet') }}</a>
      }
    </div>
  </div>

  <div class="preview" aria-hidden="true">
    <div class="pet-scene">
      <span class="sun"></span>
      <span class="hill hill-back"></span>
      <span class="hill hill-front"></span>
      <span class="dino-body"></span>
      <span class="dino-neck"></span>
      <span class="dino-head"></span>
      <span class="dino-tail"></span>
      <span class="dino-leg leg-left"></span>
      <span class="dino-leg leg-right"></span>
    </div>
  </div>
</section>
